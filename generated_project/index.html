<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div id="app">
        <h1 id="mode-indicator" class="mode">Study</h1>
        <div id="timer-display" class="timer"><span id="minutes">25</span>:<span id="seconds">00</span></div>
        <div id="progress-container" class="progress"><div id="progress-bar"></div></div>
        <div class="controls">
            <button id="start-btn" class="btn">Start</button>
            <button id="pause-btn" class="btn" disabled>Pause</button>
            <button id="reset-btn" class="btn" disabled>Reset</button>
        </div>
        <button id="settings-toggle-btn" class="btn">Settings</button>
        <section id="settings-panel" hidden class="settings">
            <label>Study Length: <input type="number" id="study-length" min="1" value="25"> min</label>
            <label>Break Length: <input type="number" id="break-length" min="1" value="5"> min</label>
            <label><input type="checkbox" id="sound-enabled" checked> Sound alerts</label>
            <button id="settings-save-btn" class="btn">Save</button>
        </section>
    </div>
</body>
</html>

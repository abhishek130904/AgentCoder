<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Todo List</h1>
    </header>
    <main>
        <section id="task-creation">
            <form id="task-form" autocomplete="off">
                <input type="text" id="task-input" placeholder="Add a new task..." required />
                <button type="submit">Add</button>
            </form>
        </section>
        <section id="task-display">
            <ul id="task-list"></ul>
        </section>
        <section id="task-filter">
            <button id="filter-all" data-filter="all">All</button>
            <button id="filter-active" data-filter="active">Active</button>
            <button id="filter-completed" data-filter="completed">Completed</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Todo List App</p>
    </footer>
</body>
</html>
